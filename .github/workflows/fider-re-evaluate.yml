name: Fider - Re-evaluate

# Periodic full-corpus re-run that ignores the triage-checked tag so previously
# triaged posts get a fresh judgement against the latest merged PRs and the
# current open-post set. Comment-marker idempotency prevents double-posting and
# tag re-application is a no-op, so the only real-world change is when the
# verdict has improved (e.g. a new PR now matches a previously not_done post,
# or a new post turns out to duplicate an older one we hadn't seen).

on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Log decisions without writing tags or comments to Fider"
        type: boolean
        default: true

jobs:
  guard_manual_run:
    uses: ./.github/workflows/guard-manual.yml
    permissions:
      contents: read
    with:
      enabled: ${{ github.event_name == 'workflow_dispatch' }}
      actor: ${{ github.actor }}
      source: manual workflow run

  reeval:
    needs: guard_manual_run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Run Fider triage (force re-eval)
        env:
          FIDER_HOST: ${{ vars.FIDER_HOST || 'https://features.maintainerr.info' }}
          FIDER_API_KEY: ${{ secrets.FIDER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
          FORCE_REEVAL: 'true'
          FIDER_TRIAGE_MODEL: openai/gpt-4.1-mini
          DISCORD_FIDER_BOT_WEBHOOK: ${{ secrets.DISCORD_FIDER_BOT_WEBHOOK }}
          DISCORD_PING_ROLE_ID: ${{ secrets.DISCORD_PING_ROLE_ID }}
        run: node tools/fider-triage.mjs
