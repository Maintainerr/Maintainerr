name: Fider - Triage

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Log decisions without writing tags to Fider"
        type: boolean
        default: true

jobs:
  guard_manual_run:
    uses: ./.github/workflows/guard-manual.yml
    permissions:
      contents: read
    with:
      enabled: ${{ github.event_name == 'workflow_dispatch' }}
      actor: ${{ github.actor }}
      source: manual workflow run

  triage:
    needs: guard_manual_run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Run Fider triage
        env:
          FIDER_HOST: ${{ vars.FIDER_HOST || 'https://features.maintainerr.info' }}
          FIDER_API_KEY: ${{ secrets.FIDER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Cron runs are always live; manual runs default to dry-run via the
          # workflow_dispatch input above so it's easy to preview decisions
          # without writing to Fider. See docs/fider-triage.md.
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
          # gpt-4.1-mini is OpenAI's documented successor to gpt-4o-mini with
          # better instruction-following — important for our strict JSON rubric
          # that requires a verbatim quote from the candidate PR. Same Low
          # rate-limit tier (150 req/day) and shape we already validated, so
          # no reason to use the larger High-tier models for this task.
          FIDER_TRIAGE_MODEL: openai/gpt-4.1-mini
        run: node tools/fider-triage.mjs
