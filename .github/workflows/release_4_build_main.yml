name: "Release 4 - Build Main"

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        type: string
        required: false
        default: main
      build_release_candidate_image:
        type: boolean
        required: false
        default: false

concurrency:
  group: release-build-main-${{ github.event_name == 'workflow_call' && inputs.ref || github.ref_name || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  DOCKERHUB_SLUG: maintainerr/maintainerr
  GHCR_SLUG: ghcr.io/maintainerr/maintainerr

jobs:
  guard_manual_run:
    uses: ./.github/workflows/guard-manual.yml
    with:
      enabled: ${{ github.event_name == 'workflow_dispatch' }}
      actor: ${{ github.actor }}
      source: manual workflow run

  build_release_candidate_image:
    name: Build ${{ matrix.platform }}
    needs: guard_manual_run
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
          - os: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.os }}
    outputs:
      sha: ${{ steps.vars.outputs.sha }}
    steps:
      - name: Prepare
        if: github.event_name == 'workflow_dispatch' || inputs.build_release_candidate_image
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref_name }}

      - name: Set outputs
        id: vars
        run: |
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.DOCKERHUB_SLUG }}
            ${{ env.GHCR_SLUG }}

      - name: Log in to GitHub Container registry
        if: github.event_name == 'workflow_dispatch' || inputs.build_release_candidate_image
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name == 'workflow_dispatch' || inputs.build_release_candidate_image
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: ${{ (github.event_name == 'workflow_dispatch' || inputs.build_release_candidate_image) && 'Build & push by digest' || 'Build image' }}
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            GIT_SHA=${{ steps.vars.outputs.sha }}
            VERSION_TAG=main
          labels: ${{ steps.meta.outputs.labels }}
          outputs: >-
            type=image,"name=${{ env.DOCKERHUB_SLUG }},${{ env.GHCR_SLUG }}",
            push-by-digest=true,name-canonical=true,
            push=${{ github.event_name == 'workflow_dispatch' || inputs.build_release_candidate_image }}

      - name: Export digest
        if: github.event_name == 'workflow_dispatch' || inputs.build_release_candidate_image
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name == 'workflow_dispatch' || inputs.build_release_candidate_image
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge Docker digests and push
    if: github.event_name == 'workflow_dispatch' || inputs.build_release_candidate_image
    runs-on: ubuntu-latest
    needs:
      - build_release_candidate_image
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Log in to GitHub Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.DOCKERHUB_SLUG }}
            ${{ env.GHCR_SLUG }}
          tags: |
            type=raw,value=main
          labels: |
            org.opencontainers.image.revision=${{ needs.build_release_candidate_image.outputs.sha }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map(select(startswith("${{ env.DOCKERHUB_SLUG }}")) | "--tag " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.DOCKERHUB_SLUG }}@sha256:%s ' *)
          docker buildx imagetools create \
            $(jq -cr '.tags | map(select(startswith("${{ env.GHCR_SLUG }}")) | "--tag " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.GHCR_SLUG }}@sha256:%s ' *)
