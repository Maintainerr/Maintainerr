name: Fider - Move enhancements

# Weekly sweep: mirrors open `label:enhancement` issues (excluding ones
# authored by a CODEOWNER) to the Fider feature board and closes the GitHub
# issue with a friendly comment linking to the new post. Idempotent - re-runs
# skip anything already mirrored.
#
# Scheduled runs always apply. Manual dispatch defaults to dry-run for
# previewing.

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Log decisions without creating Fider posts or closing issues"
        type: boolean
        default: true

jobs:
  guard_manual_run:
    uses: ./.github/workflows/guard-manual.yml
    permissions:
      contents: read
    with:
      enabled: ${{ github.event_name == 'workflow_dispatch' }}
      actor: ${{ github.actor }}
      source: manual workflow run

  move:
    needs: guard_manual_run
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.MERGE_APP_ID }}
          private-key: ${{ secrets.MERGE_APP_KEY }}

      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Move enhancement issues to Fider
        env:
          FIDER_HOST: ${{ vars.FIDER_HOST || 'https://features.maintainerr.info' }}
          FIDER_API_KEY: ${{ secrets.FIDER_API_KEY }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
        run: node tools/fider-move-enhancements.mjs
