name: Fider - Mirror enhancements (one-off)

# TEMPORARY workflow — manual trigger only, no schedule. Mirrors open
# `label:enhancement` issues (excluding CODEOWNER-authored ones) to the
# Fider feature board, then closes the GitHub issue with a link to the
# new Fider post. Defaults to dry-run.
#
# Delete this file (and tools/fider-mirror-enhancements.mjs) once the
# one-off migration is done.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Log decisions without creating Fider posts or closing issues"
        type: boolean
        default: true

jobs:
  guard_manual_run:
    uses: ./.github/workflows/guard-manual.yml
    permissions:
      contents: read
    with:
      enabled: true
      actor: ${{ github.actor }}
      source: manual workflow run

  mirror:
    needs: guard_manual_run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Mirror enhancement issues to Fider
        env:
          FIDER_HOST: ${{ vars.FIDER_HOST || 'https://features.maintainerr.info' }}
          FIDER_API_KEY: ${{ secrets.FIDER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: node tools/fider-mirror-enhancements.mjs
