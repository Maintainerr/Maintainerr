name: "Release 1 - Prepare PR"

on:
  workflow_dispatch:
    inputs:
      build_main:
        type: boolean
        description: After the PR is approved and merged, run Release 4 - Build Main to publish the main container without creating a release
        default: true

concurrency:
  group: release-prepare-pr-${{ github.ref_name || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  MAIN_BRANCH: main
  DEVELOPMENT_BRANCH: development
  RELEASE_PR_TITLE: "chore: sync development to main"
  RELEASE_PR_TEMPLATE: .github/PULL_REQUEST_TEMPLATE/release-main.md
  BUILD_MAIN_LABEL: release:build-main

jobs:
  guard_manual_run:
    uses: ./.github/workflows/guard-manual.yml
    permissions:
      contents: read
    with:
      enabled: ${{ github.event_name == 'workflow_dispatch' }}
      actor: ${{ github.actor }}
      source: manual workflow run

  guard_release_branch:
    name: Guard release branch
    needs: guard_manual_run
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Ensure release PR prep was started from development
        run: |
          if [ "${{ github.ref_name }}" != "development" ]; then
            echo "Prepare Release PR must be run from development. Current ref: ${{ github.ref_name }}"
            exit 1
          fi

  prepare_pr:
    name: Create or update release PR
    needs: guard_release_branch
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.MERGE_APP_ID }}
          private-key: ${{ secrets.MERGE_APP_KEY }}

      - name: Checkout development
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Run preflight checks
        run: |
          git fetch origin

          development_ahead_of_main="$(git rev-list --count origin/main..origin/development)"
          main_ahead_of_development="$(git rev-list --count origin/development..origin/main)"

          echo "development_ahead_of_main=${development_ahead_of_main}"
          echo "main_ahead_of_development=${main_ahead_of_development}"

          echo "==> Content diff summary"
          git diff --shortstat origin/main origin/development || true

          echo "==> Changed files"
          git diff --name-status origin/main origin/development || true

          echo "==> merge-tree preview"
          merge_base="$(git merge-base origin/main origin/development)"
          preview="$(git merge-tree "$merge_base" origin/main origin/development)"
          if [ -z "$preview" ]; then
            echo "clean"
          else
            printf '%s\n' "$preview"
          fi

          {
            echo "## Release Preflight"
            echo
            echo "- development_ahead_of_main=${development_ahead_of_main}"
            echo "- main_ahead_of_development=${main_ahead_of_development}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update release PR
        id: upsert-pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          existing_number="$(gh pr list --base "$MAIN_BRANCH" --head "$DEVELOPMENT_BRANCH" --state open --json number --jq '.[0].number // empty')"

          if [ -n "$existing_number" ]; then
            gh pr edit "$existing_number" \
              --title "$RELEASE_PR_TITLE" \
              --body-file "$RELEASE_PR_TEMPLATE"

            pr_number="$existing_number"
            pr_url="$(gh pr view "$existing_number" --json url --jq '.url')"
            echo "Updated release PR: $pr_url"
            {
              echo "## Release PR"
              echo
              echo "Updated existing PR: $pr_url"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            gh pr create \
              --base "$MAIN_BRANCH" \
              --head "$DEVELOPMENT_BRANCH" \
              --title "$RELEASE_PR_TITLE" \
              --body-file "$RELEASE_PR_TEMPLATE" >/dev/null

            pr_number="$(gh pr list --base "$MAIN_BRANCH" --head "$DEVELOPMENT_BRANCH" --state open --json number --jq '.[0].number // empty')"
            pr_url="$(gh pr view "$pr_number" --json url --jq '.url')"

            echo "Created release PR: $pr_url"
            {
              echo "## Release PR"
              echo
              echo "Created PR: $pr_url"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "pr_number=${pr_number}" >> "$GITHUB_OUTPUT"

      - name: Sync optional build label
        uses: actions/github-script@v8
        env:
          BUILD_MAIN_LABEL: ${{ env.BUILD_MAIN_LABEL }}
          BUILD_MAIN_REQUESTED: ${{ inputs.build_main && 'true' || 'false' }}
          PR_NUMBER: ${{ steps.upsert-pr.outputs.pr_number }}
        with:
          script: |
            const pullNumber = Number(process.env.PR_NUMBER);
            const labelName = process.env.BUILD_MAIN_LABEL;
            const buildMainRequested = process.env.BUILD_MAIN_REQUESTED === 'true';

            if (!Number.isInteger(pullNumber) || pullNumber <= 0) {
              core.setFailed(`Invalid PR number: ${process.env.PR_NUMBER}`);
              return;
            }

            if (buildMainRequested) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName,
                  color: '1d76db',
                  description: 'Run Release 4 - Build Main automatically after the release PR merges',
                });
              }

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pullNumber,
                labels: [labelName],
              });

              await core.summary.addRaw(`Optional post-merge main container build enabled for PR #${pullNumber}.`).write();
              return;
            }

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pullNumber,
                name: labelName,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            await core.summary.addRaw(`Optional post-merge main container build disabled for PR #${pullNumber}.`).write();
