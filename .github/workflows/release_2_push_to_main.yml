name: "Release 2 - Push PR To Main"

on:
  pull_request_review:
    types:
      - submitted

concurrency:
  group: release-push-to-main-pr-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  guard_review_actor:
    name: Guard approving actor
    if: ${{ github.event.review.state == 'approved' && github.event.pull_request.state == 'open' && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.ref == 'development' && github.event.pull_request.head.repo.full_name == github.repository }}
    uses: ./.github/workflows/guard-manual.yml
    permissions: {}
    with:
      enabled: true
      actor: ${{ github.actor }}
      source: approval review

  resolve_pr:
    name: Resolve PR context
    if: ${{ github.event.review.state == 'approved' && github.event.pull_request.state == 'open' && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.ref == 'development' && github.event.pull_request.head.repo.full_name == github.repository }}
    needs: guard_review_actor
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.pr.outputs.should_run }}
      pr_number: ${{ steps.pr.outputs.pr_number }}
      head_repo: ${{ steps.pr.outputs.head_repo }}
    steps:
      - name: Gather PR metadata
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const repoFullName = `${context.repo.owner}/${context.repo.repo}`;
            const headRepo = pr.head.repo?.full_name ?? '';
            const baseRef = pr.base.ref;
            const headRef = pr.head.ref;
            const reviewState = context.payload.review?.state ?? '';

            const shouldRun = reviewState.toLowerCase() === 'approved' && pr.state === 'open' && headRepo === repoFullName && baseRef === 'main' && headRef === 'development';

            core.setOutput('should_run', shouldRun ? 'true' : 'false');
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('head_repo', headRepo);

            if (!shouldRun) {
              core.warning(`Refusing to continue release flow for reviewState=${reviewState}, actor=${context.actor}, base=${baseRef}, head=${headRef}, repo=${headRepo}.`);
            }

  merge_pr:
    name: Squash-merge release PR
    needs: resolve_pr
    if: ${{ needs.resolve_pr.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      merge_sha: ${{ steps.merge.outputs.merge_sha }}
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.MERGE_APP_ID }}
          private-key: ${{ secrets.MERGE_APP_KEY }}

      - name: Checkout development
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: development
          token: ${{ steps.app-token.outputs.token }}

      - name: Run preflight checks
        run: |
          git fetch origin

          echo "==> Content diff summary"
          git diff --shortstat origin/main origin/development || true

          echo "==> Changed files"
          git diff --name-status origin/main origin/development || true

          echo "==> merge-tree preview"
          merge_base="$(git merge-base origin/main origin/development)"
          preview="$(git merge-tree "$merge_base" origin/main origin/development)"
          if [ -z "$preview" ]; then
            echo "clean"
          else
            printf '%s\n' "$preview"
          fi

      - name: Squash-merge PR
        id: merge
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const pull_number = Number('${{ needs.resolve_pr.outputs.pr_number }}');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            for (let attempt = 0; attempt < 120; attempt += 1) {
              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number,
              });

              if (pr.state !== 'open') {
                core.setFailed(`PR #${pull_number} is not open.`);
                return;
              }

              if (pr.mergeable_state === 'dirty' || pr.mergeable_state === 'draft') {
                core.setFailed(`PR #${pull_number} is not mergeable. mergeable_state=${pr.mergeable_state}`);
                return;
              }

              if (pr.mergeable_state === 'behind') {
                core.setFailed(`PR #${pull_number} is behind main and must be updated before release automation can continue.`);
                return;
              }

              if (pr.mergeable_state === 'clean' || pr.mergeable_state === 'has_hooks') {
                const result = await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number,
                  merge_method: 'squash',
                });

                if (!result.data.merged) {
                  core.setFailed(result.data.message ?? 'PR merge failed.');
                  return;
                }

                core.setOutput('merge_sha', result.data.sha ?? '');
                return;
              }

              if (attempt === 119) {
                core.setFailed(`PR #${pull_number} did not become merge-ready before timeout. Last mergeable_state=${pr.mergeable_state}`);
                return;
              }

              core.info(`PR #${pull_number} is not ready yet. mergeable_state=${pr.mergeable_state}. Waiting 15 seconds before retrying.`);
              await new Promise((resolve) => setTimeout(resolve, 15000));
            }

  sync_back:
    name: Sync main back to development
    needs:
      - resolve_pr
      - merge_pr
    if: ${{ needs.resolve_pr.outputs.should_run == 'true' && needs.merge_pr.result == 'success' }}
    uses: ./.github/workflows/release_3_sync_back.yml
    permissions:
      contents: write
    secrets: inherit
    with:
      ref: development
      dry_run: false

  build_main:
    name: Build main
    needs:
      - resolve_pr
      - merge_pr
      - sync_back
    if: ${{ needs.resolve_pr.outputs.should_run == 'true' && needs.merge_pr.result == 'success' && needs.sync_back.result == 'success' }}
    uses: ./.github/workflows/release_4_build_main.yml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      ref: main

  notify:
    name: Notify PR
    needs:
      - resolve_pr
      - merge_pr
      - sync_back
      - build_main
    if: ${{ always() && needs.resolve_pr.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Add result comment
        uses: actions/github-script@v8
        with:
          script: |
            const mergeResult = '${{ needs.merge_pr.result }}';
            const syncBackResult = '${{ needs.sync_back.result }}';
            const buildResult = '${{ needs.build_main.result }}';

            let body;
            if (mergeResult !== 'success') {
              body = ':bangbang: Release automation failed during squash-merge after approval.';
            } else {
              const lines = [
                ':rocket: Release automation continued after approval.',
                '',
                '- PR squash-merged into `main`',
                `- Sync back: ${syncBackResult}`,
                `- Build Main: ${buildResult}`,
              ];

              body = lines.join('\n');
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
