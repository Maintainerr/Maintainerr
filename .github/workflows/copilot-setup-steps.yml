name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy validation, and
# allow manual testing through the repository's "Actions" tab
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  guard_manual_run:
    uses: ./.github/workflows/guard-manual.yml
    permissions:
      contents: read
    with:
      enabled: ${{ github.event_name == 'workflow_dispatch' }}
      actor: ${{ github.actor }}
      allowed: "ydkmlt84"
      source: manual workflow run

  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    needs: guard_manual_run
    runs-on: ubuntu-latest

    # Set the permissions to the lowest permissions needed for these steps.
    # Copilot will be given its own token for its operations.
    permissions:
      # If setup steps clone the repo, they need `contents: read`.
      # Otherwise Copilot will check out the code after setup completes.
      contents: read

    # You can define any steps you want, and they will run before the agent starts.
    # If you do not check out your code, Copilot will do this for you.
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Activate corepack
        run: |
          corepack install
          corepack enable

      - name: Install dependencies
        run: yarn --immutable

      - name: Build contracts
        run: yarn workspace @maintainerr/contracts build
