[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
http_headers = { "X-MCP-Readonly" = "true" }

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest", "--headless", "--isolated", "--no-sandbox", "--executable-path", "/usr/bin/chromium", "--output-dir", ".playwright-mcp"]